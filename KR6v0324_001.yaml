body:
  text: 論師阿耨樓陀造民國法舫法師譯分別攝心品第一無上正等正覺者及諸正法最上僧歸命敬禮我當説阿毗達摩攝義論説此對法義勝義有四種心及心所色涅槃攝一切論曰此中先説心法彼有四種謂欲界心色界心無色界心及出世間心此中云何為欲界心謂喜受俱行邪見相應無疑非他教者一有疑及他教者一喜受俱行非邪見相應無疑非他教者一有疑及他教者一捨受俱行邪見相應無疑非他教者一有疑及他教者一如是八種名為欲界貪俱行心憂受俱行瞋相應無疑非他教者一有疑及他教者一如是二種名為瞋俱行心捨受俱行猶豫相應者一捨受俱行掉舉相應者一如是二種名為癡俱行心頌曰八種貪為根及瞋根二種愚癡根有二是為惡十二論曰捨受俱行眼識如是耳識鼻識舌識及苦受俱行身識捨受俱行等尋求心及捨受俱行等貫徹心如是七種名為不善異熟心捨受俱行眼識如是耳識鼻識舌識及樂受俱行身識捨受俱行等尋求心喜受俱行等貫徹心及捨受俱行等貫徹心如是八種名為無因善異熟心捨受俱行五根門能引發心如是意門能引發心喜受俱行阿羅漢笑心如是三種亦名無因業心如是已説總為十八不具因心頌曰不善異熟七善異熟八種業心有三種斯十八無因離不善無因是即名為善心有五十九或為九十一論曰喜受俱行智相應無疑非他教者一有疑及他教者一喜受俱行智不相應無疑非他教者一有疑及他教者一捨受俱行智相應無疑非他教者一有疑及他教者一捨受俱行非智相應無疑非他教者一有疑及他教者一如是八種名為欲界善心喜受俱行智相應無疑非他教者一有疑及他教者一喜受俱行智不相應無疑非他教者一有疑及他教者一捨受俱行智相應無疑非他教者一有疑及他教者一捨受俱行智不相應無疑非他教者一有疑及他教者一如是八種名為欲界有因異熟心喜受俱行智相應無疑非他教者一有疑及他教者一喜受俱行智不相應無疑非他教者一有疑及他教者一捨受俱行智相應無疑非他教者一有疑及他教者一捨受俱行智不相應無疑非他教者一有疑及他教者一如是八種名為欲界具因業心如是一切即是二十四種欲界具因善心異熟心及業心頌曰依受智行別數有二十四在欲界具因善異熟及業欲異熟二三二十善不善及業有十一共有五十四論曰尋伺喜樂捨心一境性相應初靜慮善心伺喜樂心一境性相應第二靜慮善心喜樂心一境性相應第三靜慮善心樂心一境性相應第四靜慮善心捨心一境性相應第五靜慮善心此五名為色界善心尋伺喜樂心一境性相應初靜慮異熟心伺喜樂心一境性相應第二靜慮異熟心喜樂心一境性相應第三靜慮異熟心樂心一境性相應第四靜慮異熟心捨心一境性相應第五靜慮異熟心此五名為色界異熟心尋伺喜樂心一境性相應初靜慮業心伺喜樂心一境性相應第二靜慮業心喜樂心一境性相應第三靜慮業心樂心一境性相應第四靜慮業心捨心一境性相應第五靜慮業心此五名為色界業心如是一切共十五種名為色界善心異熟心及業心頌曰由靜慮有五色界心差別善異熟業故總有十五種論曰空無邊處善心識無邊處善心無所有處善心及非想非非想處善心此諸心名為無色界善心空無邊處異熟心識無邊處異熟心無所有處異熟心及非想非非想處異熟心此四名為無色界異熟心空無邊處業心識無邊處業心無所有處業心及非想非非想處業心此四名為無色界業心如是一切共十二種是為無色界善心異熟心業心頌曰四種無色心所緣差別故由善異熟業更立十二種預流道心一來道心不還道心及阿羅漢道心此四名為出世善心預流果心一來果心不還果心及阿羅漢果心此四名為出世異熟心如是共八種為出世善心異熟心頌曰出世四善心由於四道別異熟心彼果是八種無上惡心唯十二善心二十一三十六異熟業心有二十十二無色心出世有八種如此應知心總有八十九若再廣分別一百二十一論曰云何八十九種心而成一百二十一謂尋伺喜樂心一境性相應初靜慮預流道心伺喜樂心一境性相應第二靜慮預流道心喜樂心一境性相應第三靜慮預流道心樂心一境性相應第四靜慮預流道心捨心一境性相應第五靜慮預流道心此五種名為預流道如是一來道心不還道心及阿羅漢道心共有二十心如此如是其果心亦爾則出世心有四十種頌曰一一禪道果分別各有五謂此無上心共有四十種應知如色界初靜慮等中出世道亦爾及無色第五故初靜慮等一一靜慮末各説十一種共有二十三善心三十七五十二異熟是故一切心一百三十一阿毗達摩攝義論分別攝心品第一竟分別攝心所品第二同一生滅故及一所緣事心相應心所法數五十二論曰此復云何觸受想思心一境性命根及作意此七心所遍一切心尋伺勝解精進喜及欲此六心所名為別境如是十三心所應知通一切心癡無慚無愧掉舉貪見慢瞋嫉慳惡作惛沉睡眠疑如是十四名不善心所信念慚愧不貪不瞋平等性身寂靜心寂靜身輕安心輕安身柔軟心柔軟身堪任心堪任身熟練心熟練身正直心正直如是十九名善心所正語正行及正命如是三種名為遠離悲喜名曰無量若俱慧根應知諸善心所共有二十五如是頌曰十三遍心所不善有十四善有二十五故説五十二彼心相應法隨應而相應如實一一攝此事後當説七一切相應如次成別境十四唯不善善唯在善心論曰云何如是謂一切心悉皆相同且初七心所可於一切心中有亦得於餘八十九種心中生起次別境中且初尋者除欲界二種五識心外唯於餘十一心中及初靜慮心中生起是故得於五十五心中生起伺者亦唯於彼十一及第二靜慮心如是可得於六十六心中生起勝解者除二種五識及疑於餘心中生起精進者除五根門及二種五識及等尋求等貫徹於餘心中生起喜者除苦受相應捨受相應者身識及第四靜慮於餘心中生起欲者除無因及癡於餘心中生起彼諸心生起如其次第頌曰六六與五五十一並十六七十及二十如次唯別境五五與六六七八及七三五一並六九與各別境俱論曰於不善中且説癡無慚無愧及掉舉四者不善體故可於餘十二不善心中生貪於八心中生謂即唯於貪相應心中生邪見於四種邪見相應心中生慢於四種邪見相應心中生瞋嫉妒及惡作於二類心中生昏沉睡眠生於五種有疑有他教心中唯疑得於疑相應心中生頌曰四於諸不善三種在貪根四種在瞋根二於有疑教疑唯在疑心此十四唯於十二不善心相應有五類論曰於善心所中且初十九心所是善體故於彼一切十九善心中而得生起且禁戒等三及所得果一切亦皆生於出世心中然於世間唯在欲界善心遇緣可別別生其無量者除第五靜慮唯於餘十二色界心善欲善心及有因欲界業心之二十八心中生若遇緣者則別別生起有説於捨相應心中無有悲喜慧者唯於十二種智相應欲界心及三十五種大果出世心生如是有四十七心而得相應頌曰一十九種法生於五十九三於十六心二十八中二般若應當知四十七種中善唯於諸善相應如是四嫉妒與惡作禁戒悲喜意別別遇時起昏沉睡眠俱所餘諸心所依處如上説今依彼次第分別彼所攝出世三十六上界三十五於欲界善中亦得三十八二十七不善十二在無因由於何因緣有此五種攝論曰此云何耶謂出世八種心中於第一靜慮心中有遍行別境十三心所及除無量餘二十三善心所是故攝有三十六法於第二靜慮心中除尋於第三靜慮心中餘尋伺於第四靜慮心中除尋伺喜於第五靜慮心中唯捨相應如是一切心所於八種出世心中由五靜慮別故攝為五種頌曰三十六與三十五三十四種應如次如是二種三十二建立五種出世心論曰上二界中於初靜慮三種心中有遍行別境十三心所及除三業餘二十二種善心所是故總攝三十五法如是應知悲喜於此各別而起如是第二靜慮心中除尋第三靜慮中除尋伺第四靜慮心中除尋伺喜其第五靜慮十五心中無有無量依此道理於上界二十七心中由五靜慮別故所攝有五種頌曰三十五與三十四三十三種應如次三十二及三十二如是五類在上界論曰於欲界善趣諸善心中其初二種有三十八法相應謂十三遍行別境心所及二十五善心所其無量戒三種於此各別而起如是於次二中除智於第三二中有智相應而除喜受於第四二中除智與喜此唯如是相攝其於業行四種二類中所攝如前唯少三戒如是於異熟心除無量及戒攝餘一切是故由二別故於欲界二十四種善心中攝為十二種頌曰於欲界有因善異熟業中善心三十八二種三十七及三十六種次業三十五二種三十四及三十三種異熟三十三二種三十二及三十一種業及上界中無有遠離戒於出世無上亦無有無量欲界異熟中無有此二類出世上界中由靜慮無量而或有不同於下欲界中戒及智與喜有時或相應論曰於不善根本貪中攝十九法謂初於無疑無他教中有遍行十三心所及共不善四如是十七並貪邪見於第二無疑無他教中所攝如前唯貪意別故其於第三亦復如是唯應除喜有貪及邪見故有十八種如是第四亦爾唯貪意別故其第五瞋相應無疑無他教心中攝二十法謂瞋嫉慳及惡作四然唯除善此嫉慳惡作於此各別而起其於五種有疑及他教心中亦復如是其所別者增昏沉睡眠而已除欲及喜餘十一遍行並四共不善如是十五法與掉舉俱生而起又於疑俱生心中除勝解唯疑俱生是故如前得十五法如是一切於十二種不善心中各攝七類各別生起其數相同故頌曰不善心中有七種十九十八與二十二十一種又二十二十二類並十五共不善有四及遍行十種如是十四類謂是不善俱論曰諸無因心中其笑心者先除欲唯攝十二遍行法如是於令起心除欲及喜於樂等貫徹心中除欲及精進於意界三種無因及結生二心中除欲喜及精進於二種五識中除諸別境唯攝彼所餘如是一切於十八種無因心中由計算故相攝有四種頌曰十二及十一十種又七種此四類生於十八非因心於諸非因心各可有七種如是所解釋此攝三十三如是已了知攝心相應類如前之所説知心之自性阿毗達摩攝義論分別攝心所品第二竟分別攝類別品第三心與心所法法爾所相應攝數五十三如次彼等現從受及其因所用與根門所緣所依事心生由此攝論曰且初攝受者有其三種謂苦與樂非苦非樂又分樂苦憂喜捨如是差別則有五種其與樂受相應者唯一善異熟身識如是苦受相應者唯不善異熟喜受相應之心有四貪根欲界十二善樂受相應等貫徹心及笑二者如是為欲界十八心又第一第二第三第四靜慮有四十四心及上界出世心總有六十二種憂受相應唯有二瞋心所餘一切唯捨受相應者有五十五頌曰樂與苦及捨是謂三種受應知由喜憂差別成五種樂苦各有一憂則有二種喜於六十二五十五為捨論曰次因所攝者因者謂有食瞋癡及不貪不瞋不癡六種由五根門轉二種五識等尋求心等貫徹令起心笑心別故是謂十八種無因心所餘一切七十一心唯是有因愚癡心雖有二種然唯一因其所餘十種不善心及智不相應欲界十二善心如此二十二心謂是俱二因心十二智相應欲界善心及上界出世三十五心如是四十七心謂是俱三因心頌曰貪瞋及愚癡是三不善因無貪無瞋癡則名善無記無因十八心二心唯一因二心二十二應知四十七具有三種因論曰三作用所攝者作用謂有結生有分能引發見聞嗅嘗觸等尋求等貫徹令生起勢用反緣死心別故有十四種結生有分能引發應知依五識處等別故彼等差別成十種二種捨受俱行等貫徹心及八種大異熟心九種色無色異熟心如是十九心名為結生有分及死亡作用有二心為能引發作用其次見聞嗅嘗觸及等尋求亦復如是有三心為等貫徹作用意門唯有能引發作用五根門唯有令生起作用除二種引發其善不善果業諸心五十五種是勢用心作用八種大異熟及三種等貫徹如是十一是反緣作用於彼等中二種捨受俱行等貫徹由結生有分死亡反緣等貫徹別故是謂五種作用其八大異熟心有四作用謂結生有分死心反緣上界九種異熟心有三種作用謂結生有分死心喜受俱行等貫徹心有二種作用謂等貫徹及反緣如是令生起心有二作用謂令起與能引發所餘諸心有一作用謂勢用心三種意界及二種五識如其自性各有一種作用頌曰所謂結生等十四作用別十種由處異心生如是説六十八及二九八二如次一二三四五即顯作用處論曰四根門所攝者門謂眼門耳門鼻門舌門身門意門六種此中眼即眼門耳等即耳門然唯有分説明意門五根門能引發者謂由眼識等尋求等貫徹令生起欲界勢用反緣差別故有四十六心如次從眼門生如是由耳識等五根門引發亦各有四十六心從耳門等生又於五門以欲界故應知有五十四心於意門中由意門引發有五十五心反緣別故有六十七心由結生有分死亡別故各有十九心唯離根轉於彼等中唯有二種五識並上界出世勢用等三十六心如其次第從一門生惟三意界從五根門生樂受相應等貫徹令生起欲界勢用從六根門生捨受俱行等貫徹及大異熟心從六根門生或離根門而生上界異熟唯離根門頌曰心由一門生五門及六門遠離於六門及遠離一切三十六及三三十一如次十種並六種五種所顯示論曰五所緣所攝者所緣有六種謂所緣色所緣聲所緣香所緣味所緣觸及所緣法唯色是所緣色如是唯聲等是所緣聲等淨色微細色心心所涅槃及諸假立如是六種攝所緣法色者唯是眼根門所生為一切心所緣此唯是現在如是聲等唯是耳門所生諸心所緣此等亦是現在但意門所生心可緣六種境或現在或過去或未來及或非時隨其所應皆得所緣其離根門者所謂結生有分死亡心亦緣六種境應知此所緣可能常有若六門所取者通於過現或是假設以業或業相及所趣相為所緣於彼等中眼識等唯有色等一種境是其所緣意界等三色等五種是其所緣其所餘者謂欲界異熟及笑心如是一切亦唯欲界是其所緣唯有不善及欲界非智相應勢用心除出世法緣一切所緣智相應欲界善及第五靜慮及神通善心除阿羅漢道果所餘一切是其所緣智相應欲界業心及其業通心令生起心如是一切以一切法為其所緣於無色中第二第四如次以第一第三為其所緣所餘上界心以一切假立為所緣出世間心以涅槃為其所緣頌曰二十五從下六心從上界二十一假立八緣涅槃境除出世二十五離聖道果及六從一切如是攝七類論曰六所依事所攝者事者有六種謂眼耳鼻舌身心依處於欲界中有此一切於色界中無鼻舌於無色界中一切不顯現次五識界如其次第謂其各別依五淨事而轉所謂五根門引發等尋求心依意界及肉團心轉所餘意識界及等貫徹心大異熟心二種瞋恚心初道心笑心及色界諸心謂皆依肉團心而轉所餘善不善及業心出世間心或有所依或無所依無色界異熟不依肉團心轉頌曰欲界依六事色心依三事應知無色界各自依一界四十三依止四十二得生依止無依止無色無依止阿毗達摩攝義論分別攝類別品第三竟分別攝毗提品第四如是心生起如前已略攝由地人異故以次分前後所謂攝轉變轉變在結生依諸力能故我略作解説論曰於攝毗提中應知有六六法謂六所依事六根門六所緣六識六毗提六現境離毗提者謂業業相及所趣相三者此中所依事根門及所緣如前已説六種識者謂眼識耳識鼻識舌識身識及意識六毗提者謂眼門毗提耳門毗提鼻門毗提舌門毗提身門毗提以門別故或眼識毗提耳識毗提鼻識毗提舌識毗提身識毗提及意識毗提以識別故根門轉故如其所應心得轉起於五根門境有極粗大粗大微細極微細境然於意門境有分明及不分明應知六種境界現前云何如是謂一剎那心有生住滅三剎那故住於色法有十七剎那心於五根門五種所緣來現前住或經一剎那心或經多剎那心是故若所緣色經一剎那心來現眼前從此彼有分心波動二次有分心之流停止轉向彼所緣色生五根門引發心生已即滅從此無間而生能見彼色眼識次等尋求等尋求心次等貫徹等貫徹心次令起令起心如其次第生已而滅從此於欲界二十九種勢用心中隨得一緣即動七次隨其勢力有二次返緣心如實現前從此仍墮有分由如是故生十四毗提心二波動有分心及過去一剎那心是則足成十七剎那心從此彼生即滅此所緣者謂是極粗大境界若所緣遲至不能生返緣心者名粗大境如是於勢用心即墮入有分故無返緣心生若所緣仍遲至不能生勢用心者名曰微細境其勢用心既不生則令起心亦未能生起即沉沒者是名極微細境此雖有分心無有心毗提生此於眼門如是於耳門等亦爾於一切處於五根門有四級心轉謂反緣勢用令起無用如其所應知所緣境界亦有四種頌曰毗提心有七心生十四種如次依五門總説五十四論曰於意根門若所緣境分明來現前者從此則有分心動次生意門能引發心勢用心反緣心成就現前從此墮入有分若非分明境於勢用心位便墮入有分位不生反緣心頌曰毗提心有二心生説有十若要廣分別欲界四十一論曰根本靜慮勢用心中所緣無有分明不分明別反緣心亦不生起於八種智相應欲界勢用心中隨於一種有初業近分隨順種姓心依次生起或三或四剎那生已無間即滅如其所應於其第四或第五剎那隨其所願於上界出世間二十六心中證得一種勢用心退至根本靜慮毗提此從靜慮末仍沉沒於有分位若勢用心喜受俱行如是無間所證靜慮亦可喜受俱行若勢用心捨受俱行如是無間所證靜慮亦可捨受俱行復次善勢用無間所證靜慮及下三果亦復是善業勢用無間所證亦爾是名阿羅漢果頌曰三十二種善功德此後捨受十二種復有八種樂受業應知證得六種捨諸凡夫有學欲界三善因阿羅漢證得從三因善行如是名為意門毗提心轉道理於此一切若不可意境是不善異熟有五識等尋求等貫徹及反緣心若可意境即善異熟若極可意境其等尋求與反緣心有喜受俱行彼亦如是謂喜受俱行業勢用末其反緣心亦喜受俱行捨受俱行業勢用末彼亦捨受俱行憂受俱行勢用心終以捨受俱行故墮入反緣心及有分心是故其於憂受俱行終位若得喜受相應結生心則不生反緣心於是生捨受俱行等貫徹心緣欲界中隨於所緣彼於過去曾所習者有諸餘師作如是説即於彼後墮入有分如是唯於欲界勢用心終及欲界有情及於欲界所攝所緣有反緣心頌曰於欲界勢用有情及所緣分明與粗顯得起彼事心論曰諸勢用心於欲界勢用毗提欲界毗提動七次或六次若昏弱位若命終等時惟動五次有作是説世尊現雙神變時極迅速故其勢用心可有四剎那或五剎那初修行人證第一靜慮上界勢用及神通勢用恆唯動一剎那從此墮入有分四種道心生起唯有一剎那此從其證果心如其次第生二三剎那從此墮入有分於證滅盡定時其第四靜慮及無色界勢用動二次已即證滅定若出定時如其次第或得不還果或阿羅漢果其勢用心起一次已墮入有分如是於一切三摩鉢底毗提心中猶如有分流其毗提心無有間斷是故勢用多亦可得頌曰下界有七次神通道有一應知於餘處勢用心有多論曰於此其具二因及不具因者不得業勢用心及證靜慮勢用心如是雖生善趣亦不得智相應異熟心若在惡趣其智不相應大異熟心亦不可得於具三因者中其漏盡者不得善不善勢用心如是有學凡夫業勢用心亦不能得諸有學者不得邪見相應或疑相應勢用心諸不還者無有瞋忿勢用出世間勢用如其次第唯聖者生起頌曰無學四十四五十六有學餘者五十四如是説具因論曰欲界地中此一切心毗提如次而得色界地中唯除瞋恚及反緣心無色界地中除初道心色界心及下下無色心於一切處若離彼彼淨色者則不能得此此根門毗提心無想有情無有一切心頌曰欲毗提八十六四色如次如是在無色可得四十二論曰如是由六根門諸心得轉現墮入有分相續不斷乃至命存無間而轉阿毗達摩攝義論分別攝毗提品第四分別攝離毗提品第五如是前已説此毗提心轉現前攝結生是事今當説論曰有四種地四種結生四種業四種死應知此四各又有四攝離毗提四種地者謂惡趣地欲界善趣地色界地無色界地此中地獄傍生餓鬼阿修羅名為四種惡趣人四大王衆天三十三天夜摩天都史陀天樂變化天及他化自在天是名欲界七種善趣地此十一種唯名欲界地梵衆天梵輔天大梵天是謂初靜慮地少光天無量光天極光淨天是第二靜慮地少淨天無量淨天遍淨天是第三靜慮地廣果天無想有情及淨居天是第四靜慮地淨居天有五種謂無熱天無煩天善現天善見天及色究竟天是名色為界十六種天空無邊處地識無邊處地無所有處地非想非非想處地是四種名為無色界地頌曰凡夫不可得生諸淨居天預流及一來斯人亦不得聖者皆不生惡趣諸地中聖者非聖者得生餘諸處論曰四種結生者謂惡趣結生欲界善趣結生色界結生及無色界結生不善異熟捨受相應等貫徹心於惡趣中初剎那結生已從此即成有分直致死位方斷此謂惡趣結生者其善異熟捨受相應等徹貫心唯於善趣人中生育等及地居神劣阿素羅有結生有分及死心轉其八大異熟亦於欲界善趣轉現結生有分死亡此謂欲界九種結生此九及前一名曰欲界結生於彼等中四種惡趣人及惡阿修羅壽量無決定四大王衆天壽量為天壽五百年合人壽為九百萬年從此四倍計算是三十三天壽量此四倍夜摩此四倍覩史陀此四倍化樂天此四倍他化自在天頌曰此人間壽量歲九十二億一千六百萬是彼天人壽論曰第一靜慮異熟於第一靜慮中轉起結生有分死心如是第二靜慮第三靜慮異熟於第二靜慮地中第四靜慮於第三靜慮地中第五靜慮於第四靜慮地中結生無想有情唯於色界結生如是從此而住唯於死時色轉起已而即滅亡此為色界結生於彼等中其梵衆天壽量為一劫三分之一梵輔天半劫大梵天一劫少光天二劫無量光天四劫極光天八劫少淨天十六劫無量淨天三十二劫遍淨天六十四劫廣果天及無想天五百劫無熱天千劫無煩天二千劫善見天四千劫善現天八千劫色究竟天一萬二千劫第一無色異熟等如其次第於第一無色等地中轉起結生有分死心此四名為無色結生於彼等中空無邊處天壽量為二萬劫識無邊處天為四萬劫無所有處天為六萬劫非想非非想處天為八萬四千劫頌曰結生並有公及後死心位唯於一生命中同境同性相論曰業有四種者由作用別故有生業有住業擾亂業及殺生業由所受果別故有重業死前造業數數所造業及已作業由成熟時別故有現受業後受業後後受業及非受業由受果地別故有不善趣業欲界善業色界善業及無色界善業不善業有三種謂身業語業意業以業門別故此復云何謂由於身門身表多時所作殺生不語取及欲邪行是名身業由於語門語表多時所作妄語兩舌惡口及綺語是名語業唯於意識由他所表多時所作貪瞋邪見是名意業於彼等中其殺生惡口及瞋由瞋根所生欲邪行綺語及邪見從貪根生餘四從二根生此諸不善由心生故有十二種欲界善業依於身門有身業轉依於語門有語業轉及依於意門有意業轉如是由業門別故而有三種施戒修別亦復如是此依心生所成八種又十種者謂施戒修尊敬作事回向隨喜聽法説法正直見此二十種唯名欲界業色果善業唯是意義彼即攝修證由靜慮支別故成五種無色善業亦爾即是意業亦唯攝修證以所緣別故有四種除掉舉外此中所餘諸不善業於惡趣中而得結生於現生中十二不善業於欲界中隨墮何處皆可現起七種不善異熟色界如其所應生起異熟欲界善業亦唯在欲界善趣結生如是於現生中生大異熟由不具因於欲界中隨於何處生八善異熟於色界中如其所應生起異熟具三因勝善業者亦復如是唯與具三因結生於現生中有十六種異熟現起復次具三因劣業及具二因勝業此二與其二因善業結生並於現在生中生十二異熟除具三因其具二因劣業者唯與無因善者結生於現生中唯生無因異熟頌曰無疑非他教不能生異熟有疑及他教有疑及他教亦不生異熟無疑非他教此是異師説如是依次第彼異熟十二十種及八種如前已宣説我今隨力説論曰色界善者修習下品第一靜慮已生梵衆天若修習中品已則生梵輔天若上品修習已則生大梵天如是修習下品第二第三靜慮已則生少光天修習中品已則生無量光天修習上品已則生極光淨天修習下品第四靜慮已則生少淨天中品修習已則生無量淨天上品修習已則生遍淨天修習第五靜慮已生廣果天如是修習於彼離想已則生無想天阿那含人唯生淨居天中修習無色界善已如其次第生無色界頌曰此二界善業依彼地決定引生同異熟結生與現行論曰死有四種者謂由壽盡故死由業盡故死由俱盡故死及由業壞故死如是死者於其死時由業力故六根門中隨於其一有心現前由過去生現起此業而得結生次或現起過去彼作業時所成色等業相及造作業相及其作具次或現起無間將受生有所受苦及應受樂之所趣相此後即住於如是境相心恆相續數數而轉依其已成熟業有染有淨或隨順所趣應得後有唯此業能生後有可於六門現前而轉若彼死者正在死時謂即在其毗提心終位或在有分心盡時而死其死心生已還滅即是最後生有於彼滅後無間結生意識現起而住起始執取彼所緣境如其所應或有所依或無所依由無明隨眠纏縛及愛隨眠為其根本行故而得生起由相應故而有執取是俱生依處由結續前有及結合後有故是名結心意即此現生住於後有於正在死時死心毗提由心微弱故其勢用唯五剎那是故當其死心現前時若所緣境確實來現其前者則結生心有分心亦即獲得所緣現前以是現前已若在欲界結生由六根門取得業相或取所趣相屬於現在或過去所緣但所緣業唯是過去及為意根所取如是一切所緣法唯屬下界色界結生心唯以假立業相為所緣如是無色界結生以上界或以假立業相隨其所應而為所緣無想有情唯於命九色結生而住是故彼等名色結生者其無色者名無色結生者所餘名色無色結生者頌曰無色界滅已除生下無色結生上或等欲界具三因色界有情死不生無因類諸欲三因者依業生三界欲界他有情唯生於欲界論曰如是已取結生者於其結生心滅已從彼無間其心直緣彼所緣境乃至毗提心未生起時此有分心相續不斷猶如河流乃至死心生位此相續業以是有之分故名曰有分乃至最後以死緣故死心生已則滅從此即再取結生如是次第猶如車輪展轉流轉頌曰結生及有分毗提並死心如是至後有再結生有分如是此即是心相續轉變如是擇滅了無常智者得入涅槃路最善斷除愛纏縛具戒人證恆寂靜阿毗達摩攝義論分別攝離毗提品第五竟分別色品第六如是前已説心及心所法自性用分別今當説色法性及類作用聚集並形相如是此五種略攝諸色法論曰有四大種及四大種所造色此二種色總攝十一種云何爾耶謂地界水界火界風界是名大種色眼耳鼻舌身名為淨色色聲香味及除水界所餘大種觸名為境色女男根名為性色心所依處名為肉團心色命根名為命色段食名為食色如是十八種色總攝有性色有相色所生色變異色及定色空界謂斷色身表語表謂表色輕色柔輕色適宜行色及二表色謂殊勝色生住相續老無常謂相色此中生色謂緣生相續如是此十一種色各各自性別故得成二十八種頌曰大種淨及境性與肉團心由命根及食此有十八種斷色及表色及變異相色此十非所生共有二十八論曰此一切色依一門分別者謂是非因有緣有漏有為世間欲界非有所緣非可斷多門分別者謂內外等此復云何所謂內色者謂五種淨色別者為外色淨色與肉團心謂六種所依色其餘為非所依色淨色表色謂七種根門色所餘非根門色淨色性根命根謂八種為根色餘者為非根色淨色境色謂是十二種色粗色近色有對色所餘為微細色遠色無對色業所生色謂有執受色餘者為非有執受色色處名有見色所餘為無見色眼等二種取境非合鼻等三者合故取境如是五種名境界色所餘為非境界色色香味食色及四大種如是八種謂無差別色所餘為差別色頌曰斯二十八種智者應依次由內等別故如此而分別論曰有四種等起色謂業心氣候及食物所等起故欲界及色界所作善不善二十五種業名等起色業於內相續取結生時剎那剎那令等起故除無色異熟及二種五識有七十五種心名等起色心於取第一有分時令等起故其靜慮勢用心能加強威儀安立心欲界勢用心及神通能等起表色其十三種喜相應勢用心亦能生笑所謂冷熱氣候者即火界熱性是等起色氣候如其所應能等起內外色故食物及所謂滋養物謂是等起色食至內消化已能等起而住故其肉心及諸根色唯從業生二種表色唯從心生聲音從心氣生輕等三色從氣候心及食物生非離色及空界色從四種生四相色非從他生頌曰十八與十五十三及十二從業心氣食如次第生起即彼色自性自始具生等是故四種相不從他所生論曰諸色有二十一聚同生同減同所依同住命根與八不可分離色是名命根九色聚此若與眼俱即名眼十色聚如是與耳等俱則名耳等十色聚鼻十色聚舌十色聚身十色聚女性十色聚男性十色聚及心依處十色聚如次相應由八不可分離色與命根色俱是謂命根九色聚此九種謂是業等起色聚心等起色聚有六種謂不可分離八種淨色若此與身表俱有是謂身表九色聚若與語表聲俱有是謂語表十色聚與輕等俱有則有輕等十一聚身表輕等十二色聚語表聲輕等有十三種色聚淨八色聚聲九色聚輕等十一及聲輕等十二色聚此四種色聚由氣候等起淨八色及輕等十一此二種色聚由食物等起又淨八色聚及聲九色聚此二種色聚由氣候等起亦由外得一切所餘唯得內色聚頌曰業心食氣候如次而等起九六四及二成二十一聚空色謂類界相是類自性智者説空相非屬此色聚論曰此一切色如其所應於欲界中皆得現起謂於結生時若濕生類及化生類極多可得眼耳鼻身性心依處七種十色聚有時化生不得眼耳鼻性根等十色聚由此應知彼所缺聚初受胎有情可得身性根心依處五種十色聚有時亦或不得性色聚從此以後在其現生時眼等十聚少分少分漸得生長如是初取結生時為業等起色第二剎那為心等起色其取住時由氣候等起其取增長時由食物等起於欲界中由此四種等起色聚相續而轉乃至命終猶如燈焰亦如河流其於死時從十七剎那死心最後住止時已無業等起色生起前此已生業所生色唯與死心同時生滅從此其心所生及食物所生色亦滅從此以後彼氣候等起色展轉相續乃至尸尸存在頌曰如是死滅已隨處而再生於取結生時彼色即轉現論曰於色界中不可得鼻舌身性根各十色聚及食所生色聚是故彼於結生時可得眼耳心依處三者各十色聚及命九色聚如是四種由業等起於現住位可得由心氣候等起無想有情無有眼耳心依處聲其心所生一切色亦爾是故彼等於結生時唯有命根九色聚於現住位除聲有餘氣候等起色如是欲及色無想三處中應知有二種色轉現謂結生現住別故頌曰欲界二十八二十三色界十七無想天無色無所有初結生不得聲表老及死其於現住位無何而不得論曰言涅槃者謂是出世由四種道智所應證得是道是所緣境槃者謂愛欲涅者謂出離出離愛欲故名涅槃依其自性分別唯有一種二種者謂有餘依涅槃及無餘依涅槃如是由行相別故有空無相無願三種涅槃頌曰大仙解脫愛無滅無窮極無為而無上是説為涅槃如是心心所色法與涅槃是勝利諦故如來説四種阿毗達摩攝義論分別色品第六竟分別攝集法品第七七十二法種謂有實事相彼等心相應性結我今説論曰應知攝集法有四種謂攝不善法攝和集法攝覺支法及攝一切法此復云何初攝不善法者有四漏謂欲漏有漏見漏及無明漏次有四瀑流謂欲瀑流有瀑流見瀑流及無明瀑流次有四軛謂欲軛有軛見軛及無明軛復次有四繫縛謂貪身繫縛瞋生繫縛戒禁取身繫縛及見取身繫縛復次有四取謂欲取見取戒禁取及我見取復次有六蓋謂貪欲蓋瞋恚蓋睡眠惡作蓋掉舉散亂蓋疑蓋及無明蓋復次有七隨眠謂欲貪隨眠有貪隨眠慢隨眠見隨眠疑隨眠及無明隨眠復次契經中説有十結謂欲貪結色貪結無色貪結瞋結慢結見結戒禁取結疑結掉舉結及無明結復次對法中説有十結謂欲貪結貪有結瞋結慢結見結戒禁取結疑結嫉結慳結及無明結復次有十煩惱謂貪瞋癡慢見疑昏沉掉舉無慚無愧此所説漏等中欲漏有漏謂即是愛有彼境界如是戒禁取執此是實及執有我故説邪見唯由此轉頌曰所説漏瀑流四軛及繫縛實事各有三取一蓋有九煩惱十應知九種攝要法論曰攝和集法者有六因謂貪嗔癡無貪無嗔無癡復次靜慮支有七謂尋伺喜心一境性悅憂捨道支有十二謂正見正思惟正語正業正命正精進正念正定邪見邪思維邪精進邪定有二十二根謂眼根耳根鼻根舌根身根女根男根命根意根樂根苦根喜根憂根捨根信根勤根念根定根慧根未知當知根已知根具知根力有九種謂信力勤力念力定力慧力慚力愧力無慚力無愧力有四增上謂欲增上心增上精進增上慧增上有四食謂段食第一觸食第二思食第三識食第四於此根中其未知當知根即是預流道智具知根是阿羅漢果智中間六智謂所餘根命根有二色無色別故於五識中諸靜慮支不可得於非精進中諸力不可得於無因中諸道支不可得如是於疑心中心一境性修道根力皆不可得唯於具二因或三因勢用心中隨所依力有一增上可得頌曰因六禪支五道支有九事十六即根事力有九種法增上説四事如是食亦爾此七攝和集善等得圓滿論曰攝菩提分者謂有四念處循身觀念處循受觀念處循心觀念處循法觀念處有四正斷謂已生惡法令斷未生惡法令不生未生善法令生已生善法令增長有四神足謂欲神足心神足精進神足慧神足有五根謂信根勤根念根定根慧根有五力謂信力勤力念力定力慧力有七覺支謂念覺支擇法覺支精進覺支喜覺支輕安覺支三摩地覺支捨覺支有八正道支謂正見正思維正語正業正命正精進正念正三摩地今此所説四念處者謂與正念是一其四正斷者謂即正精進頌曰欲及心與捨信輕安並喜正見正思維三離正精進正念與正定實性唯十四分別三十七總攝成七種思維輕安及喜捨欲心正語等三離精進有九念有八定四慧五信有二三十七種無上法是為最善分別者一切皆出世或無思維喜如次於世間清淨有六種論曰攝一切法者有五蘊謂色蘊受蘊想蘊行蘊識蘊有五取蘊謂色取蘊受取蘊想取蘊行取蘊識取蘊有十二處謂眼處耳處鼻處舌處身處意處色處聲處香處味處觸處法處有十八界謂眼界耳界鼻界舌界身界色界聲界香界味界觸界眼識界耳識界鼻識界舌識界身識界意界法界意識界有四聖諦謂苦聖諦苦集聖諦苦滅聖諦苦滅道聖諦由心所柔軟色涅槃別故有六十九法攝在法處法界中意處唯攝七識界頌曰色與受及想餘心所為行心識為第五是説為五蘊又有五取蘊應知即三有以無差別故涅槃非蘊攝根門所緣別故成十二處根門及所緣並所生為界苦三有輪回愛即諸有因涅槃名為滅應知出世道道相應為果是名為四諦如是由五類謂攝一切法阿毗達摩攝義論分別攝集法品第七竟分別攝緣品第八頌曰彼諸有為法云何諸法緣如所應次第我今分別説論曰攝緣者應知有二種謂緣起正理與發趣正理緣起正理者謂唯顯示此有故彼有相發趣正理者謂由依緣住故由論師採集故二者合論無明緣行行緣識識緣名色名色緣六處六處緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死具足憂悲苦惱純大苦蘊聚此即所謂緣起正理此中應知有三時十二支二十種相三種結續四種分類三種輪轉及二根本此復云何三時者謂無明行在過去時生老死在未來時中間八種是現在時十二支者謂無明行識名色六處觸受愛取有生老死憂悲等言顯等流果此中若攝取無明行者則已攝取愛取有如是若攝取愛取有者無明行亦已攝取若取生老死者則已攝取識等五果頌曰過去因有五現在有五果五因為現在未來果亦五論曰如是即成二十相三結續及四分類三輪者謂無明愛取是煩惱輪業有一分及諸行是業輪所謂生有一分及餘支分是異熟輪二根本者應知即是無明與愛頌曰乃至根本斷彼輪回始滅以諸老死集故恆受逼迫無明為緣起諸漏而隨轉如此輪回縛三有而無始是故大牟尼建立緣起法論曰發趣正理者謂因緣所緣緣增上緣無間緣等無間緣俱生緣互依緣助緣具足緣先生緣後生緣數數生緣業緣異熟緣不相應緣有緣無緣離緣非離緣此是發趣正理頌曰名與名依有六種名與名色唯有五若名與色唯有一色與名依一亦然諸假立名色依名有二種二依二有九六種緣云何論曰名與名為緣有六種者謂心心所無間滅已由無間緣等無間緣無緣及離緣故可生現在心心所法由數數生緣故前勢用心引生後勢用心由相應緣故俱生心心所法互相為依名與色為緣有五種者謂由因緣等故則因靜慮支道支與俱生名色為緣由業緣故其俱生思與俱生名色為依緣及不俱生思與過去業所生名色為依由異熟緣故異熟蘊與異熟蘊及俱生色彼此互依名與色為緣有一種緣者謂由後生緣故此身先生已然後生心心所法色與色為緣有一種者謂六所依事於現生中由前生緣故能生七識界五種所緣於現生中由前生緣故能生五識毗提假立名色與名為緣有二種者謂由所緣緣及近依緣所緣緣者即是色等六種近依緣有三種謂所緣近依無間近依及有自性近依所緣近依者謂唯重境無間近依者謂無間滅心心所法自性近依者有多種謂貪等信等法樂苦數取趣食氣候臥具如其次第為內為外或惡及業與異熟法為緣名色與名色為緣有九種者謂如其次第由增上緣俱生緣互依緣食緣根緣不相應緣有緣不離緣等此中增上緣有二種由所緣增上故心有粗重所緣由俱生緣則四種俱生增上與俱生名色為緣俱生緣有三種謂心心所法與心心所及俱生色互相依止大種與自類及所造色彼此互依於結生時肉團心與異熟彼此互依互依緣有三種謂心心所法彼此互依諸四大種彼此互依於結生時肉心與異熟彼此互依依止緣有三種謂心心所法與心心所及俱生色彼此互相依止四大種與自類及所造色彼此互相依止六所緣事與七識界互相依止食緣有二種謂段食於身及無色食於俱生名色為緣根緣有三種謂五淨色根於五識為緣色命根於所執受色及無色諸根於俱生名色為緣不謂應緣有三種謂趣結生時肉心於異熟心心心所法於俱生色雖是俱生而不相應後生心心所法於前生此身以後生故而不相應六所依事於現生中七識界由前生故而不相應有緣與不離緣有如是五種謂俱生前生後生段食及色命此一切緣可由所緣緣近依緣有緣而總攝之此中所謂俱生色者應知有二種謂俱生色於現在生中一切皆由諸心等起結生位色過去業所作頌曰此諸三世法及離繫諸有如此內與外有為及無為由名色假立皆三者相攝發趣論中説二十四種緣論曰此中色法者唯攝色蘊心心所法攝無色四蘊及涅槃如是五種無色説之為名所餘名為假立假立有二種謂假立所知及假立能知云何如是謂由執取彼彼大種所變行相則假立此山此地等執取所造行相則假立房舍車乘等執取五蘊等則假立人我執取月分位等則假立時方等執取無觸行相則假立井穴等執取彼彼地相而多修習者則假立遍處相等如是等分別於勝義諦非真實有唯是名義影像是心執取以為所緣以此為因故有彼彼執取故有此此所遍計所示現所想所説所知如是説為假立此假立名為假立所知假立能知者謂有六種唯是名字之所詮表此謂假立實有假立非實有假立實有非實有假立非實有實有假立實有實有假立非實有非實有謂色受等恆時於勝義諦有由此了知此即名為假立實有謂地山等恆時於勝義諦非有由此了知此即名為假立非實有所餘二相合假立者如其次第應知即是具六神通者女人聲音眼識及王子頌曰隨順言音故及耳識毗提此有而無間意門即生起此成彼境界則隨順何境後即生意門彼成意門境應知此假立安立世間法阿毗達摩攝義論分別攝緣品第八竟分別攝行境品第九此後我當説修習奢摩陀及毗婆舍那二行境如次論曰且初攝奢摩陀謂十遍處十不淨觀十念處四無量一想觀四大種及四無色如此七類攝奢摩陀食欲行者瞋恚行者愚癡行者信行者覺行者尋求行者如是六種攝修行者有三種修習初業修習近分修習證得修習應知有三種相謂下品觀影取影相及似質影相此復云何所謂十遍處者謂地遍處水遍處火遍處風遍處青色遍處黃色遍處赤色遍處白色遍處空遍處光明遍處所謂十不淨想者謂膨脹青淤濃潰皮裂食噉斬砍離散支殘血塗染蟲騷擾骨所謂十隨念者謂念佛念法念僧念戒念施念天念寂念死念身念出入息慈悲喜捨此名為四無量亦名為梵住一想者謂厭食想一分別者謂分別四大種空無邊處等名四無色如是一切共有四十所行境界釋奢摩陀諸行者中貪欲行者宜修十不淨及循身念瞋恚行者宜修四無量及青色等四遍處阿那波那是愚癡行者及尋求行者所行境界念佛等六是具信心行者所修境界念死念寂念食念四大種是覺者所修境界所餘一切行境適於一切行者如是於修諸遍處其廣大圓相是愚癡行者所行境界若尋求人應唯修小圓相此是分別適宜相於修習時初業修習隨處可得念佛等八種及厭食想分別四大種於此十種行境中唯得修習近分定非根本定其所餘三十行境亦得依止修習根本定其修十遍處及阿那波那證五種靜慮修十不淨想及觀身念處可證初靜慮修慈等三種無量證得四種靜慮修捨無量證得第五靜慮如是修此二十六種行境證色界四靜慮若修四種無色者證得無色靜慮此是分別修習相於諸相中一切行境如其所應略而言之得下品觀相及取影相其似質影相唯由修遍處不淨想循身觀及阿那波那而能證得由證似質影相彼可轉進得近分定及根本定此復云何謂初業行者取地圓相等以為所緣此即説為下品行所修觀相彼即於此而修習之是名修習下品行觀相如是修習此觀相已此相由心善為觀取乃至若於意門分明顯現猶如眼見是名影相彼應守持而修習之從此以後專注影相專意修習者由修下品行三摩地故若時似質影相離所依事體即名假立所緣由修習所成於其心中善為安立善為集中是即名為最善修習似質影相自此以後由斷障縛故由成就所修近分定故是名成就欲界所修三摩地此後修持似質相者由得淨分三摩地力故證色界第一靜慮此後彼修第一靜慮者由五種修習謂轉向入住出回觀修習此五種已即捨尋求等粗惡支證伺察等微細支由此次第精勤修如其所應證得第二靜慮等如是於地遍處等二十二種行境如法修習皆可證得似質影相所餘行境其四無量唯於假立有情轉若彼行者除空遍處隨破任一遍處即得空無邊際下品行觀相而證第一無色靜慮若彼行者以能觀初無色識為所緣而修下品觀相證得第二無色靜慮若得彼者以無初無色識則為無所有故而修下品觀相證得第三無色靜慮行者如是以此第三無色靜慮修下品觀相得最寂靜最妙樂者證得第四無色靜慮所餘十行境中以佛功德等為所緣修習下品觀相已善取此相時唯住下品觀行或證近分若有從色界第五靜慮起為現神通者彼從神通足第五靜慮起已其意專注所緣作下品修習已即於所緣色等如次證得神通靜慮所謂神通者如有頌曰神變與天耳及知他心智宿命及天眼是名為五種此是分別境界中明三摩地行境正理已竟毗婆舍那行境者攝七種清淨謂戒清淨心清淨見清淨斷疑清淨道非道清淨修行知見清淨及知見清淨有三種相謂無常相苦相無我相有三種觀謂無常觀苦觀無我觀有十種觀智謂有為智生滅智壞滅智恐怖智障智厭離智出離智觀察智行捨智隨順道智有三解脫謂空解脫無相解脫無願解脫如是應知有三解脫觀謂空解脫觀無相解脫觀無願解脫觀此復云何謂別解脫律儀戒根律儀戒命清淨戒及緣依具足戒如是四種清淨名戒清淨近分三摩地根本三摩地如是二種三摩地名心清淨由依相用作緣起親因別故持取名色是謂見清淨持取彼名色之緣是名斷疑清淨斷諸疑後修等持者依蘊等正理於三界有為過去等差別及如前説通達名色之緣而為依類分別謂由盡故無常由布畏故苦由無自在故無我彼修等持者依時分位故或依相續故或依剎那故由有為智故而觀三相修等持者於此等相由緣故剎那故生滅智故數數而觀諸法生滅如有頌言光明喜輕安勝解與精進智證並安樂捨受及少欲若執取光明等者是為毗婆舍那煩惱障縛此是建立非道相是名道非道知見清淨其修定者解脫此障已由證得生滅智乃至隨順智彼相續觀三相有九種毗婆舍那智是名正行知見清淨如是修正行者毗婆舍那修成熟已現在生中當生根本定生起意門能引發心斷諸有分從此無間有二三剎那毗婆舍那心隨觀無常等一相則是下品觀相近分隨順轉生彼觀若至頂位有隨順行捨謂引趣生出世毗婆舍那彼生種姓心緣於涅槃則轉捨異生種姓轉得聖種姓彼於此無間唯生聖道心由知苦諦斷集諦證滅諦修道諦故生起證果毗提從此轉生聖果心二三剎那已即墮入有分心復次有分心斷已轉生妙觀察智頌曰斷盡諸煩惱智者則觀見涅槃及道果有餘則不見如是應修習六種清淨道由四種漸次是名知見淨論曰由觀無我故斷除堅固我執亦名觀空解脫道由觀無常故斷除不正相亦名觀無相解脫道由觀苦故斷除愛欲亦名無願解脫道是故由毗婆舍那所引出世道得三種名謂若毗婆舍那觀法無我是名空解脫道若毗婆舍那觀有為無常是名無相解脫道若毗婆舍那觀有漏皆苦是名無願解脫道如是果位隨道毗提由所修道別故亦得三名證果毗提如前所説隨其毗婆舍那後如其次第而證其果而得其名謂空解脫等雖由所緣及業別故而此三名一切皆共是為分別觀相若修預流果道者由斷邪見疑故離生惡趣極多七次往返故名預流若有已修一來道者伏貪嗔癡唯一次來生此世故名一來若有已修不還道者斷除欲嗔別無所斷不來生此世故名不來若已修阿羅漢道者無別煩惱所斷是漏盡者名阿羅漢應受世間最上供養是名分別補特伽羅此中其證果毗提一切相同如其次第唯自果別故證滅盡等至者唯不還人及阿羅漢如是如其次第證初靜慮等上界等至從彼起已於彼有為法唯觀彼彼相乃至證得無所有處從此作先所應作證得非想非非想處於彼起二剎那證得勢用心彼相續心即滅自此以後名得滅盡等至者從定起時若是不來得不來果心若是阿羅漢得阿羅漢果心唯有一剎那轉已即是有分從此轉生妙觀察智此是分別等至毗婆舍那行境正理竟頌曰願通達聖教受用正行果智者應修習二種修無上阿毗達摩攝義論分別攝行境品第九竟
